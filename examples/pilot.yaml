# grom native dashboard config — Pilot metrics from Prometheus.
# A btop-style overview: headline stats, a gauge + bar gauge, and two charts.
# Run: grom run --config examples/pilot.yaml --prom http://localhost:9093
title: pilot
theme: pilot
refresh: 10s
range: 6h

widgets:
  # Row 1 — headline stats with trend bands (24-col grid, four across).
  - type: stat
    title: success rate
    unit: percentunit
    sparkline: true
    grid: { x: 0, y: 0, w: 6, h: 4 }
    # Thresholds mirror the web pilot-dashboard.json Issue Success Rate panel.
    thresholds:
      - color: red
      - value: 0.5
        color: yellow
      - value: 0.8
        color: green
    queries:
      # Issue-level: shipped / attempted, deduped across retries — same metric as
      # the web dashboard. The per-attempt pilot_success_rate reads higher (retries
      # count in its favor) and is deprecated for delivery health (Pilot TASK-392).
      - expr: pilot_issue_level_success_rate

  - type: stat
    title: tokens
    unit: short
    sparkline: true
    grid: { x: 6, y: 0, w: 6, h: 4 }
    queries:
      - expr: sum(pilot_tokens_consumed_total)

  - type: stat
    title: cost / shipped
    unit: currencyUSD
    decimals: 2
    sparkline: true
    grid: { x: 12, y: 0, w: 6, h: 4 }
    queries:
      # Cost per *shipped* issue — same denominator family as the success-rate
      # card (issues_processed_total counts attempt outcomes, not unique issues).
      # `> 0` guards the zero-denominator case: renders "no data", not +Inf.
      - expr: sum(pilot_execution_cost_usd_total) / (sum(pilot_issues_shipped_total) > 0)

  - type: stat
    title: prs merged
    unit: short
    sparkline: true
    grid: { x: 18, y: 0, w: 6, h: 4 }
    queries:
      # Lifetime since pilot 2f25dcd0 (hydrates from executions, not the ledger).
      - expr: sum(pilot_prs_merged_total)

  # Row 2 — CI pass gauge + token breakdown bars.
  - type: gauge
    title: pr delivery
    unit: percentunit
    min: 0
    max: 1
    grid: { x: 0, y: 4, w: 12, h: 6 }
    thresholds:
      - color: red
      - value: 0.8
        color: yellow
      - value: 0.95
        color: green
    queries:
      # Lifetime PRs delivered vs failed. Pilot exports no CI-specific pass/fail
      # counter yet — once pilot#4134 ships pilot_ci_runs_total{result}, repoint
      # this gauge and retitle it "ci pass rate".
      # `> 0` guards the zero-denominator case: renders "no data", not +Inf.
      - expr: sum(pilot_prs_merged_total) / ((sum(pilot_prs_merged_total) + sum(pilot_prs_failed_total)) > 0)

  - type: bargauge
    title: tokens by direction
    unit: short
    grid: { x: 12, y: 4, w: 12, h: 6 }
    queries:
      - expr: sum(pilot_tokens_consumed_total) by (direction)
        legend: "{{direction}}"

  # Row 3 — always-defined charts: a cumulative cost curve and stacked token rate.
  # Since pilot#4029 the counter is lifetime (store-hydrated), so the curve is the
  # true all-time spend, not since-restart.
  - type: timeseries
    title: cumulative cost
    unit: currencyUSD
    grid: { x: 0, y: 10, w: 12, h: 8 }
    queries:
      - expr: sum(pilot_execution_cost_usd_total)
        legend: cost

  - type: timeseries
    title: tokens / 5m
    unit: short
    stacked: true
    grid: { x: 12, y: 10, w: 12, h: 8 }
    queries:
      - expr: sum(rate(pilot_tokens_consumed_total[5m])) by (direction)
        legend: "{{direction}}"

  # Row 4 — time per issue: two same-unit series overlaid (stacked omitted →
  # overlay: first query fills as area, later ones draw as lines on top).
  # 1h windows: each point is the average over merges/executions in that hour;
  # gaps mean no activity. exec durations are session-scoped upstream (not yet
  # store-hydrated — asked in pilot#4134), so that line starts sparse.
  - type: timeseries
    title: time / issue
    unit: s
    grid: { x: 0, y: 18, w: 24, h: 8 }
    queries:
      - expr: sum(increase(pilot_pr_time_to_merge_seconds_sum[1h])) / (sum(increase(pilot_pr_time_to_merge_seconds_count[1h])) > 0)
        legend: to merge
      - expr: sum(increase(pilot_execution_duration_seconds_sum[1h])) / (sum(increase(pilot_execution_duration_seconds_count[1h])) > 0)
        legend: exec
